name: Flexible Eagle Plugin Package

on:
  push:
    paths:
      - manifest.json
      - .eagleplus/config/pkg-rules.json
      - .eagleplus/scripts/**
      - .github/workflows/package-plugin.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check allowed branches
        id: check_branches
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function escapeRegex(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function matchesPattern(branch, pattern) {
              const regex = new RegExp(`^${escapeRegex(pattern).replace(/\\\*/g, '.*')}$`);
              return regex.test(branch);
            }

            const branchName = context.ref.replace('refs/heads/', '');
            const configPath = path.join(process.cwd(), '.eagleplus', 'config', 'pkg-rules.json');

            let allowedBranches = ['main'];
            if (fs.existsSync(configPath)) {
              const pkgRules = JSON.parse(fs.readFileSync(configPath, 'utf8'));
              if (Array.isArray(pkgRules.branches) && pkgRules.branches.length > 0) {
                allowedBranches = pkgRules.branches;
              }
            }

            const allowed = allowedBranches.some(pattern => matchesPattern(branchName, pattern));
            core.info(`Branch '${branchName}' allowed: ${allowed}`);
            core.setOutput('allowed', String(allowed));

      - name: Stop on disallowed branch
        if: steps.check_branches.outputs.allowed != 'true'
        run: |
          echo "Branch is not allowed for packaging. Skipping release job."

      - name: Set up Node.js
        if: steps.check_branches.outputs.allowed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read manifest version
        if: steps.check_branches.outputs.allowed == 'true'
        id: manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            core.setOutput('version', String(manifest.version || '0.0.0'));

      - name: Check if release exists
        if: steps.check_branches.outputs.allowed == 'true'
        id: check_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${{ steps.manifest.outputs.version }}`;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Release ${tag} already exists.`);
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
                return;
              }
              throw error;
            }

      - name: Build release package
        if: steps.check_branches.outputs.allowed == 'true' && steps.check_release.outputs.exists != 'true'
        id: build_release
        shell: bash
        run: |
          output=$(node .eagleplus/scripts/package-plugin.cjs release)
          echo "path=$output" >> "$GITHUB_OUTPUT"

      - name: Build debug package
        if: steps.check_branches.outputs.allowed == 'true' && steps.check_release.outputs.exists != 'true'
        id: build_debug
        shell: bash
        run: |
          output=$(node .eagleplus/scripts/package-plugin.cjs debug)
          echo "path=$output" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.check_branches.outputs.allowed == 'true' && steps.check_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.manifest.outputs.version }}
          name: v${{ steps.manifest.outputs.version }}
          files: |
            ${{ steps.build_release.outputs.path }}
            ${{ steps.build_debug.outputs.path }}
          draft: false
          prerelease: false